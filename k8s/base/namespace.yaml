apiVersion: v1
kind: Namespace
metadata:
  name: iga
  labels:
    app.kubernetes.io/part-of: iga-platform
---
# Default-deny network policy (REQ-INF-033); per-service allows are additive
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny
  namespace: iga
spec:
  podSelector: {}
  policyTypes: [Ingress, Egress]
  egress:
    - to: []
      ports:
        - { protocol: UDP, port: 53 }
        - { protocol: TCP, port: 53 }
        - { protocol: TCP, port: 443 }
        - { protocol: TCP, port: 636 }   # LDAPS for AD connector
        - { protocol: TCP, port: 5671 }  # AMQP-over-TLS for Service Bus/Event Hubs
        - { protocol: TCP, port: 1433 }  # Azure SQL (source-system-service, Phase 2.1)
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-intra-namespace-app
  namespace: iga
spec:
  podSelector: {}
  policyTypes: [Ingress, Egress]
  ingress:
    - from:
        - podSelector: {}
      ports:
        - { protocol: TCP, port: 8080 }
  egress:
    - to:
        - podSelector: {}
      ports:
        - { protocol: TCP, port: 8080 }
