apiVersion: v1
kind: ServiceAccount
metadata:
  name: identity-service
  namespace: iga
  annotations:
    azure.workload.identity/client-id: "${IDENTITY_SVC_CLIENT_ID}"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: identity-service
  namespace: iga
spec:
  replicas: 2
  selector:
    matchLabels: { app: identity-service }
  template:
    metadata:
      labels:
        app: identity-service
        azure.workload.identity/use: "true"
    spec:
      serviceAccountName: identity-service
      containers:
        - name: identity-service
          image: ${ACR_LOGIN_SERVER}/identity-service:${IMAGE_TAG}
          ports: [{ containerPort: 8080 }]
          env:
            - { name: COSMOS_ENDPOINT,     value: "https://${COSMOS_ACCOUNT}.documents.azure.com:443/" }
            - { name: EVENTHUB_NAMESPACE,  value: "${EVENTHUB_NAMESPACE}.servicebus.windows.net" }
            - { name: EVENTHUB_NAME,       value: "identity-changes" }
            - { name: ENTRA_TENANT_ID,     value: "${ENTRA_TENANT_ID}" }
            - { name: API_AUDIENCE,        value: "${API_AUDIENCE}" }
          livenessProbe:
            httpGet: { path: /healthz, port: 8080 }
            initialDelaySeconds: 10
          readinessProbe:
            httpGet: { path: /readyz, port: 8080 }
            initialDelaySeconds: 5
          resources:
            requests: { cpu: 250m, memory: 256Mi }
            limits:   { cpu: "1",  memory: 512Mi }
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
---
apiVersion: v1
kind: Service
metadata:
  name: identity-service
  namespace: iga
spec:
  selector: { app: identity-service }
  ports: [{ port: 80, targetPort: 8080 }]
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: identity-service
  namespace: iga
spec:
  scaleTargetRef: { apiVersion: apps/v1, kind: Deployment, name: identity-service }
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target: { type: Utilization, averageUtilization: 70 }
