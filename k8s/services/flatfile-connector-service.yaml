apiVersion: v1
kind: ServiceAccount
metadata:
  name: flatfile-connector-service
  namespace: iga
  annotations:
    azure.workload.identity/client-id: "${FLATFILE_CONNECTOR_SVC_CLIENT_ID}"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: flatfile-connector-service
  namespace: iga
spec:
  replicas: 2
  selector:
    matchLabels: { app: flatfile-connector-service }
  template:
    metadata:
      labels:
        app: flatfile-connector-service
        azure.workload.identity/use: "true"
    spec:
      serviceAccountName: flatfile-connector-service
      containers:
        - name: flatfile-connector-service
          image: ${ACR_LOGIN_SERVER}/flatfile-connector-service:${IMAGE_TAG}
          imagePullPolicy: Always
          ports: [{ containerPort: 8080 }]
          env:
            - { name: STORAGE_ACCOUNT_NAME, value: "${LAKE_STORAGE_ACCOUNT}" }
            - { name: SOURCE_SYSTEM_SERVICE_URL, value: "http://source-system-service" }
            - { name: IDENTITY_SERVICE_URL, value: "http://identity-service" }
            - { name: PROVISIONING_SERVICE_URL, value: "http://provisioning-service" }
            - { name: API_AUDIENCE, value: "${API_AUDIENCE}" }
            # REQ-COR-SRC-007 pre-start window (days before startDate at which
            # the lifecycle sweep activates a pending-start identity)
            - { name: PRE_START_ACTIVATION_DAYS, value: "3" }
          livenessProbe:
            httpGet: { path: /healthz, port: 8080 }
            initialDelaySeconds: 10
          readinessProbe:
            httpGet: { path: /readyz, port: 8080 }
            initialDelaySeconds: 5
          resources:
            requests: { cpu: 250m, memory: 256Mi }
            limits:   { cpu: "1",  memory: 512Mi }
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
          volumeMounts:
            - { name: tmp, mountPath: /tmp }
      volumes:
        - { name: tmp, emptyDir: {} }
---
apiVersion: v1
kind: Service
metadata:
  name: flatfile-connector-service
  namespace: iga
spec:
  selector: { app: flatfile-connector-service }
  ports: [{ port: 80, targetPort: 8080 }]
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: flatfile-connector-service
  namespace: iga
spec:
  scaleTargetRef: { apiVersion: apps/v1, kind: Deployment, name: flatfile-connector-service }
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target: { type: Utilization, averageUtilization: 70 }
