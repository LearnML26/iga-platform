# CI pipeline — REQ-INF-071/072/073
name: ci
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  id-token: write   # OIDC federation to Azure — no stored secrets
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Bicep build (IaC validation)
        run: |
          curl -sLo bicep https://github.com/Azure/bicep/releases/latest/download/bicep-linux-x64
          chmod +x bicep
          ./bicep build infra/main.bicep --stdout > /dev/null

      - name: Python lint + tests
        run: |
          # Pinned: an unpinned ruff let lint strictness drift with upstream
          # releases (0.16.0 expanded the default rule set and broke every
          # in-flight PR with pre-existing findings). Bump deliberately, in
          # its own commit, alongside any new fixes the bump requires.
          pip install ruff==0.16.0 pytest
          ruff check src/
          # pytest src/  # enable as test suites land

      - name: Container scan (REQ-INF-073)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: src/
          severity: CRITICAL,HIGH
          exit-code: '1'

  build-push:
    if: github.ref == 'refs/heads/main'
    needs: validate
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [identity-service, provisioning-service, source-system-service, flatfile-connector-service, notification-service, rbac-service, access-request-service]
    steps:
      - uses: actions/checkout@v4
      - name: Azure login (OIDC federated — configure AZURE_CLIENT_ID/TENANT_ID/SUBSCRIPTION_ID as repo variables)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}
      - name: Build and push
        run: |
          az acr login --name ${{ vars.ACR_NAME }}
          IMAGE=${{ vars.ACR_NAME }}.azurecr.io/${{ matrix.service }}:${GITHUB_SHA::7}
          docker build -t $IMAGE src/${{ matrix.service }}
          docker push $IMAGE
